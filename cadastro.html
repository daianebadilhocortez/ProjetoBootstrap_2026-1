<div class="container-fluid" style="margin-top:70px; padding:20px;">

<div class="panel panel-info">
<div class="panel-heading">Cadastro de Processo Administrativo</div>
<div class="panel-body">
Registro de novos processos com definição de prioridade e controle de prazos.
</div>
</div>

<form>

<div class="form-group">
<label>Unidade Responsável</label>
<input type="text" class="form-control" placeholder="Ex: Secretaria de Administração">
</div>

<div class="form-group">
<label>Email Institucional</label>
<input type="email" class="form-control" placeholder="email@orgao.gov.br">
</div>

<div class="form-group">
<label>Tipo de Processo</label>
<select class="form-control">
<option>Selecione</option>
<option>Licitação</option>
<option>Convênio</option>
<option>RH</option>
<option>Compras</option>
</select>
</div>

<div class="form-group">
<label>Prioridade</label>
<select class="form-control">
<option>Baixa</option>
<option>Média</option>
<option>Alta</option>
</select>
</div>

<div class="form-group">
<label>Descrição</label>
<textarea class="form-control"></textarea>
</div>

<button class="btn btn-primary" data-toggle="modal" data-target="#modal">Registrar</button>

</form>

</div>

<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-body">Processo registrado com sucesso.</div>
<div class="modal-footer">
<button class="btn btn-success" data-dismiss="modal">OK</button>
</div>
</div>
</div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
