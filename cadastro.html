<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-default">
    <div class="container-fluid">
        <div class="navbar-header">
            <a class="navbar-brand" href="index.html">Sistema Administrativo</a>
        </div>
        <ul class="nav navbar-nav">
            <li><a href="index.html">Início</a></li>
            <li class="active"><a href="cadastro.html">Cadastro</a></li>
            <li><a href="listagem.html">Listagem</a></li>
            <li><a href="dashboard.html">Painel</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h2>Cadastro</h2>

    <form>
        <div class="form-group">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control">
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control">
        </div>

        <div class="form-group">
            <label class="form-label">Setor</label>
            <select class="form-control">
                <option>Administrativo</option>
                <option>Financeiro</option>
                <option>RH</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Observações</label>
            <textarea class="form-control"></textarea>
        </div>

        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#modalSucesso">
            Enviar
        </button>
    </form>
</div>

<div class="modal fade" id="modalSucesso">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4>Sucesso</h4>
            </div>
            <div class="modal-body">
                Cadastro realizado com sucesso
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" data-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="bootstrap/js/bootstrap.min.js"></script>

</body>
</html>
