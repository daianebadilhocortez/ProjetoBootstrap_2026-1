<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container-fluid">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#menuTopo">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="index.html">Sistema Administrativo</a>
        </div>

        <div class="collapse navbar-collapse" id="menuTopo">
            <ul class="nav navbar-nav">
                <li><a href="index.html">Início</a></li>
                <li class="active"><a href="cadastro.html">Cadastro</a></li>
                <li><a href="listagem.html">Listagem</a></li>
                <li><a href="dashboard.html">Painel</a></li>
                <li><a href="relatorios.html">Relatórios</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="margin-top:70px;">

    <h2>Cadastro</h2>

    <form>
        <div class="row">
            <div class="col-md-6">
                <label>Nome</label>
                <input type="text" class="form-control" placeholder="Digite o nome">
            </div>

            <div class="col-md-6">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="Digite o email">
            </div>
        </div>

        <br>

        <div class="form-group">
            <label>Tipo</label>
            <select class="form-control">
                <option>Selecione</option>
                <option>Funcionário</option>
                <option>Cliente</option>
            </select>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea class="form-control" rows="3"></textarea>
        </div>

        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#modalSucesso">
            Enviar
        </button>
    </form>

</div>

<div class="modal fade" id="modalSucesso">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4>Confirmação</h4>
            </div>
            <div class="modal-body">
                Cadastro realizado com sucesso.
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" data-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="bootstrap/js/bootstrap.min.js"></script>

</body>
</html>
